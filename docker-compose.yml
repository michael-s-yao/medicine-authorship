services:
  project:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./:/app:cached
    environment:
      - PYTHONUNBUFFERED=1
    command: ["bash", "run.sh"]
  dev:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    working_dir: /app
    stdin_open: true
    tty: true
    command: bash
    environment:
      - TZ=UTC
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    user: "0"
    container_name: medicine-authorship-dev
